<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Book Cover Screensaver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body {
            background: #000;
            font-family: 'Courier New', monospace;
            color: #0f0;
        }
        
        canvas {
            display: block;
            background: #000;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border: 2px solid #0f0;
            border-radius: 8px;
            z-index: 1000;
            max-width: 350px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 15px;
                max-width: none;
                font-size: 14px;
            }
            
            .controls h3 {
                font-size: 16px;
                margin-bottom: 10px;
            }
            
            label {
                width: 110px;
                font-size: 12px;
            }
            
            input[type="range"] {
                width: 120px;
            }
            
            .value {
                width: 40px;
                font-size: 12px;
            }
            
            button {
                font-size: 12px;
                padding: 6px 12px;
                margin-top: 8px;
            }
            
            .info {
                bottom: 10px;
                right: 10px;
                padding: 10px;
                font-size: 10px;
            }
            
            .loading {
                font-size: 18px;
            }
        }
        
        /* Prevent scrolling on mobile */
        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            -webkit-overflow-scrolling: touch;
        }
        
        .controls h3 {
            margin-bottom: 15px;
            color: #0f0;
        }
        
        .control-group {
            margin-bottom: 10px;
        }
        
        label {
            display: inline-block;
            width: 150px;
            color: #0f0;
        }
        
        input[type="range"] {
            width: 150px;
        }
        
        .value {
            display: inline-block;
            width: 50px;
            text-align: right;
            color: #0f0;
        }
        
        button {
            margin-top: 10px;
            margin-right: 5px;
            padding: 8px 16px;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            cursor: pointer;
            border-radius: 4px;
        }
        
        button:hover {
            background: #0f0;
            color: #000;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #0f0;
            border-radius: 8px;
            font-size: 12px;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 24px;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Loading book covers... <span id="loadProgress">0/367</span></div>
    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <h3>📚 BOOK COVER SCREENSAVER</h3>
        
        <div class="control-group">
            <label>Book Count:</label>
            <input type="range" id="bookCount" min="5" max="100" value="30" step="5">
            <span class="value" id="bookCountValue">30</span>
        </div>
        
        <div class="control-group">
            <label>Speed:</label>
            <input type="range" id="speed" min="0.1" max="5" value="1" step="0.1">
            <span class="value" id="speedValue">1.0</span>
        </div>
        
        <div class="control-group">
            <label>Book Size:</label>
            <input type="range" id="bookSize" min="50" max="200" value="100" step="10">
            <span class="value" id="bookSizeValue">100</span>
        </div>
        
        <div class="control-group">
            <label>Rotation Speed:</label>
            <input type="range" id="rotationSpeed" min="0" max="5" value="1" step="0.5">
            <span class="value" id="rotationSpeedValue">1.0</span>
        </div>
        
        <div class="control-group">
            <label>Trail Length:</label>
            <input type="range" id="trailLength" min="0" max="1" value="0.05" step="0.05">
            <span class="value" id="trailLengthValue">0.05</span>
        </div>
        
        <button onclick="resetBooks()">🔄 Reset Books</button>
        <button onclick="toggleControls()">👁️ Hide Controls</button>
    </div>
    
    <div class="info">
        <strong>Book Cover Screensaver</strong><br>
        • Loaded: <span id="loadedCount">0</span>/367 books<br>
        • Active books: <span id="activeCount">0</span><br>
        • FPS: <span id="fps">0</span>
    </div>

        if (isMobile) {
            settings.bookCount = 15; // Fewer books for better performance
            settings.trailLength = 0.1; // Slightly longer trail
            document.getElementById('bookCount').value = 15;
            document.getElementById('bookCountValue').textContent = 15;
        }
        
        // ========================================
        // CANVAS SETUP
        // ========================================
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', {
            alpha: false, // Disable alpha for better performance
            desynchronized: true // Improve rendering performance
        });
        
        function resizeCanvas() {
            // Use device pixel ratio for sharp rendering on high-DPI screens
            const dpr = isMobile ? Math.min(window.devicePixelRatio, 2) : window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Pause animation when page is hidden (saves battery on mobile)
        let isAnimating = true;
        document.addEventListener('visibilitychange', () => {
            isAnimating = !document.hidden;
        });
        
        // ========================================
        // IMAGE LOADING
        // ========================================
        
        let loadedImages = [];
        let loadedCount = 0;
        
        function loadImages() {
            return new Promise((resolve) => {
                let loaded = 0;
                
                bookUrls.forEach((url, index) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    
                    img.onload = () => {
                        loadedImages.push(img);
                        loaded++;
                        loadedCount = loaded;
                        document.getElementById('loadProgress').textContent = `${loaded}/${bookUrls.length}`;
                        document.getElementById('loadedCount').textContent = loaded;
                        
                        if (loaded === bookUrls.length) {
                            resolve();
                        }
                    };
                    
                    img.onerror = () => {
                        loaded++;
                        loadedCount = loaded;
                        document.getElementById('loadProgress').textContent = `${loaded}/${bookUrls.length}`;
                        
                        if (loaded === bookUrls.length) {
                            resolve();
                        }
                    };
                    
                    img.src = url;
                });
            });
        }
        
        // ========================================
        // BOOK CLASS
        // ========================================
        
        class Book {
            constructor() {
                if (loadedImages.length === 0) return;
                
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                // Random velocity
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                // Random rotation
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                
                // Random image
                this.image = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                
                // Random size variation
                this.sizeMultiplier = 0.8 + Math.random() * 0.4;
            }
            
            update(settings) {
                // Move book
                this.x += this.vx * settings.speed;
                this.y += this.vy * settings.speed;
                
                // Wrap around edges
                if (this.x < -settings.bookSize) this.x = canvas.width + settings.bookSize;
                if (this.x > canvas.width + settings.bookSize) this.x = -settings.bookSize;
                if (this.y < -settings.bookSize) this.y = canvas.height + settings.bookSize;
                if (this.y > canvas.height + settings.bookSize) this.y = -settings.bookSize;
                
                // Rotate
                this.rotation += this.rotationSpeed * settings.rotationSpeed;
            }
            
            draw(ctx, settings) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const size = settings.bookSize * this.sizeMultiplier;
                const aspectRatio = this.image.height / this.image.width;
                const width = size;
                const height = size * aspectRatio;
                
                // Draw book cover with slight shadow for depth
                ctx.shadowColor = 'rgba(0, 255, 0, 0.3)';
                ctx.shadowBlur = 10;
                ctx.drawImage(this.image, -width / 2, -height / 2, width, height);
                
                ctx.restore();
            }
        }
        
        // ========================================
        // SIMULATION STATE
        // ========================================
        
        let books = [];
        let settings = {
            bookCount: 30,
            speed: 1.0,
            bookSize: 100,
            rotationSpeed: 1.0,
            trailLength: 0.05
        };
        
        function resetBooks() {
            books = [];
            for (let i = 0; i < settings.bookCount && i < loadedImages.length; i++) {
                books.push(new Book());
            }
            document.getElementById('activeCount').textContent = books.length;
        }
        
        // ========================================
        // UPDATE SETTINGS FROM UI
        // ========================================
        
        function updateSetting(id, property) {
            const element = document.getElementById(id);
            const valueElement = document.getElementById(id + 'Value');
            
            element.addEventListener('input', (e) => {
                const value = parseFloat(e.target.value);
                settings[property] = value;
                valueElement.textContent = value;
                
                if (property === 'bookCount') {
                    while (books.length < value && books.length < loadedImages.length) {
                        books.push(new Book());
                    }
                    while (books.length > value) {
                        books.pop();
                    }
                    document.getElementById('activeCount').textContent = books.length;
                }
            });
        }
        
        updateSetting('bookCount', 'bookCount');
        updateSetting('speed', 'speed');
        updateSetting('bookSize', 'bookSize');
        updateSetting('rotationSpeed', 'rotationSpeed');
        updateSetting('trailLength', 'trailLength');
        
        // ========================================
        // MAIN ANIMATION LOOP
        // ========================================
        
        let lastTime = performance.now();
        let frameCount = 0;
        let lastFpsUpdate = lastTime;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            // Skip rendering if page is hidden
            if (!isAnimating) return;
            
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            // Update FPS counter
            frameCount++;
            if (currentTime - lastFpsUpdate > 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
            }
            
            // Create trail effect
            ctx.fillStyle = `rgba(0, 0, 0, ${settings.trailLength})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Update and draw all books
            books.forEach(book => {
                book.update(settings);
                book.draw(ctx, settings);
            });
        }
        
        // ========================================
        // UI HELPER FUNCTIONS
        // ========================================
        
        function toggleControls() {
            const controls = document.querySelector('.controls');
            const button = event.target;
            if (controls.style.display === 'none') {
                controls.style.display = 'block';
                button.textContent = '👁️ Hide Controls';
            } else {
                controls.style.display = 'none';
                button.textContent = '👁️ Show Controls';
            }
        }
        
        // ========================================
        // TOUCH CONTROLS FOR MOBILE
        // ========================================
        
        if (isTouch) {
            let touchStartX = 0;
            let touchStartY = 0;
            
            canvas.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault(); // Prevent scrolling
            }, { passive: false });
            
            // Double tap to toggle controls
            let lastTap = 0;
            canvas.addEventListener('touchend', (e) => {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                
                if (tapLength < 500 && tapLength > 0) {
                    // Double tap detected
                    toggleControls();
                }
                
                lastTap = currentTime;
            });
        }
        
        // ========================================
        // INITIALIZATION
        // ========================================
        
        loadImages().then(() => {
            document.getElementById('loading').style.display = 'none';
            resetBooks();
            animate(performance.now());
            
            console.log(`
╔═══════════════════════════════════════════════╗
║  BOOK COVER SCREENSAVER LOADED               ║
╚═══════════════════════════════════════════════╝

Successfully loaded ${loadedImages.length} book covers!
Mobile device: ${isMobile ? 'Yes' : 'No'}

FEATURES:
• Each book has random position, velocity & rotation
• Books wrap around screen edges
• Adjustable count, speed, size & rotation
• Trail effect for motion blur
• Real book covers from your collection
${isMobile ? '• Optimized for mobile performance\n• Double-tap screen to toggle controls' : ''}

Enjoy your flying library! 📚✨
            `);
        });
    </script>
</body>
</html>
